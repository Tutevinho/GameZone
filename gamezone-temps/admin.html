<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="utf-8">
  <title>GameZone — Panel de Recepció</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; padding: 20px; }
    h1 { font-size: 20px; margin-bottom: 20px; color: #222; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
    .puesto { background: white; border-radius: 12px; padding: 16px;
              border: 2px solid #e0e0e0; text-align: center; }
    .puesto.activo { border-color: #22c55e; }
    .puesto.alerta { border-color: #f59e0b; }
    .puesto.libre  { border-color: #e0e0e0; }
    .nombre { font-weight: 600; font-size: 15px; margin-bottom: 8px; }
    .tiempo { font-size: 36px; font-weight: bold; color: #111; margin: 8px 0; }
    .tiempo.alerta   { color: #f59e0b; }
    .tiempo.expirado { color: #ef4444; }
    select, input { width: 100%; padding: 6px; border: 1px solid #ddd;
                    border-radius: 6px; font-size: 14px; margin: 4px 0; }
    button { width: 100%; padding: 8px; border: none; border-radius: 8px;
             cursor: pointer; font-size: 14px; margin-top: 4px; }
    .btn-start { background: #22c55e; color: white; }
    .btn-add   { background: #3b82f6; color: white; }
    .btn-stop  { background: #ef4444; color: white; }
    .btn-start:hover { background: #16a34a; }
    .btn-add:hover   { background: #2563eb; }
    .btn-stop:hover  { background: #dc2626; }
  </style>
</head>
<body>
<h1>Panel de Recepció — GameZone</h1>
<div class="grid" id="puestos"></div>


<script>
const PUESTOS = [
  { id: '1',  nombre: 'PCGaming1' },
  { id: '2',  nombre: 'PCGaming2' },
  { id: '3',  nombre: 'PCGaming3' },
  { id: '4',  nombre: 'PCGaming4' },
  { id: '5',  nombre: 'PCGaming5' },
  { id: '6',  nombre: 'PCGaming6' },
  { id: '7',  nombre: 'Consola1 (PS5)' },
  { id: '8',  nombre: 'Consola2 (PS5)' },
  { id: '9',  nombre: 'Consola3 (PS5)' },
  { id: '10', nombre: 'Consola4 (Xbox)' },
  { id: '11', nombre: 'Consola5 (Xbox)' },
  { id: '12', nombre: 'Consola6 (Xbox)' },
  { id: '13', nombre: 'AltRendiment1' },
  { id: '14', nombre: 'AltRendiment2' },
  { id: '15', nombre: 'VR 0' },
  { id: '16', nombre: 'VR 1' },
];


const SERVIDOR = 'http://192.168.1.1:8000';
let state = {};


function fmt(seg) {
  if (seg <= 0) return '00:00';
  const m = String(Math.floor(seg / 60)).padStart(2, '0');
  const s = String(seg % 60).padStart(2, '0');
  return `${m}:${s}`;
}


async function iniciar(id) {
  const mins = parseInt(document.getElementById(`mins-${id}`).value);
  if (!mins) return;
  const expira = Date.now() + mins * 60000;
  await fetch(`${SERVIDOR}/update`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ [id]: { expira, nombre: PUESTOS.find(p => p.id === id).nombre } })
  });
}


async function afegirTemps(id) {
  const seg = Math.max(0, Math.round(((state[id]?.expira || 0) - Date.now()) / 1000));
  const extra = parseInt(document.getElementById(`add-${id}`).value) * 60000;
  const expira = (seg > 0 ? state[id].expira : Date.now()) + extra;
  await fetch(`${SERVIDOR}/update`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ [id]: { expira, nombre: state[id]?.nombre || id } })
  });
}


async function acabar(id) {
  await fetch(`${SERVIDOR}/update`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ [id]: { expira: 0, nombre: '' } })
  });
}


function render() {
  document.getElementById('puestos').innerHTML = PUESTOS.map(p => {
    const seg = Math.max(0, Math.round(((state[p.id]?.expira || 0) - Date.now()) / 1000));
    const activo = seg > 0;
    const claseCard = activo ? (seg < 300 ? 'alerta' : 'activo') : 'libre';
    const claseNum  = seg < 300 && activo ? 'alerta' : (seg === 0 && state[p.id]?.expira ? 'expirado' : '');
    return `
      <div class="puesto ${claseCard}">
        <div class="nombre">${p.nombre}</div>
        <div class="tiempo ${claseNum}">${activo ? fmt(seg) : '—'}</div>
        <select id="mins-${p.id}">
          <option value="30">30 min</option>
          <option value="60" selected>1 hora</option>
          <option value="90">1h 30min</option>
          <option value="120">2 hores</option>
          <option value="180">3 hores</option>
        </select>
        <button class="btn-start" onclick="iniciar('${p.id}')">&#9654; Iniciar</button>
        <select id="add-${p.id}">
          <option value="15">+ 15 min</option>
          <option value="30">+ 30 min</option>
          <option value="60">+ 1 hora</option>
        </select>
        <button class="btn-add" onclick="afegirTemps('${p.id}')">+ Afegir temps</button>
        <button class="btn-stop" onclick="acabar('${p.id}')">&#9646; Acabar</button>
      </div>`;
  }).join('');
}


async function tick() {
  try {
    const r = await fetch(`${SERVIDOR}/state`);
    state = await r.json();
  } catch(e) {}
  render();
}


setInterval(tick, 1000);
tick();
</script>
</body>
</html>
